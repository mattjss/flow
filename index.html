<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flow</title>
  <style>
    :root { --sz: 100vmin; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: block;
    }
    #label {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="500" height="500"></canvas>
    <span id="label">flow — move + click</span>
  </div>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const W = 500, H = 500;

  // ── Grid ──────────────────────────────────────────────────────────────────
  const COLS = 48, ROWS = 48;
  const GAP  = W / COLS;

  // Pre-build dot positions with tiny random offsets so it feels organic, not rigid
  const dots = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      dots.push({
        x: (c + 0.5) * GAP + (Math.random() - 0.5) * 1.4,
        y: (r + 0.5) * GAP + (Math.random() - 0.5) * 1.4,
      });
    }
  }

  // ── Wave sources ──────────────────────────────────────────────────────────
  // Two persistent sources orbit the canvas in slow ellipses
  const AMBIENT = [
    { ox: W * 0.50, oy: H * 0.44, rx: W * 0.28, ry: H * 0.22, speed: 0.19, phase: 0,           omega: 1.55 },
    { ox: W * 0.50, oy: H * 0.56, rx: W * 0.26, ry: H * 0.20, speed: 0.15, phase: Math.PI,      omega: 1.82 },
  ];

  function ambientPos(src, t) {
    return {
      x: src.ox + Math.cos(src.phase + t * src.speed) * src.rx,
      y: src.oy + Math.sin(src.phase + t * src.speed) * src.ry,
    };
  }

  // Burst sources added on click, decay over time
  const bursts = [];

  let mx = -9999, my = -9999, isInside = false;

  // ── Wave function ─────────────────────────────────────────────────────────
  const K = 0.044; // wavenumber → wavelength ≈ 143px (~3.5 rings visible)

  function waveAt(px, py, t) {
    let h = 0;

    // Ambient sources
    for (const src of AMBIENT) {
      const p = ambientPos(src, t);
      const d = Math.sqrt((px - p.x) ** 2 + (py - p.y) ** 2);
      h += Math.sin(K * d - src.omega * t);
    }

    // Cursor source (stronger — lets the user's position dominate)
    if (isInside) {
      const d = Math.sqrt((px - mx) ** 2 + (py - my) ** 2);
      h += 2.2 * Math.sin(K * d - 2.0 * t);
    }

    // Burst sources
    for (const b of bursts) {
      const age = t - b.born;
      const amp = 3.0 * Math.exp(-age * 1.3);
      if (amp < 0.04) continue;
      const d = Math.sqrt((px - b.x) ** 2 + (py - b.y) ** 2);
      h += amp * Math.sin(K * d - 2.8 * t);
    }

    return h;
  }

  // ── Visual ring flash ─────────────────────────────────────────────────────
  const clickRings = [];

  // ── Events ────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (W / r.width);
    my = (e.clientY - r.top)  * (H / r.height);
    isInside = true;
  });
  canvas.addEventListener('mouseleave', () => { isInside = false; mx = -9999; my = -9999; });

  canvas.addEventListener('pointerdown', e => {
    const r  = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    const now = performance.now() / 1000;
    bursts.push({ x: cx, y: cy, born: now });
    clickRings.push({ x: cx, y: cy, r: 0, born: 0 });
    if (bursts.length > 4) bursts.shift();
    playClick();
  });

  // ── Audio ─────────────────────────────────────────────────────────────────
  let clickAudio = null;
  function initAudio() {
    if (clickAudio) return;
    clickAudio = new Audio('./sounds/selection.mp3');
    clickAudio.volume = 0.42;
  }
  function playClick() { initAudio(); clickAudio.currentTime = 0; clickAudio.play().catch(()=>{}); }

  // ── Draw ──────────────────────────────────────────────────────────────────
  // How many active sources for normalisation
  function numSources(t) {
    let n = AMBIENT.length;
    if (isInside) n += 2.2; // cursor counts as stronger source
    for (const b of bursts) {
      const age = t - b.born;
      const amp = 3.0 * Math.exp(-age * 1.3);
      if (amp > 0.04) n += amp;
    }
    return Math.max(1, n);
  }

  const t0 = performance.now();
  let   dt_last = 0;

  function draw(now) {
    const t  = (now - t0) / 1000;
    const dt = Math.min(t - dt_last, 0.05);
    dt_last  = t;

    // Age / remove bursts
    for (let i = bursts.length - 1; i >= 0; i--) {
      const age = t - bursts[i].born;
      if (3.0 * Math.exp(-age * 1.3) < 0.04) bursts.splice(i, 1);
    }
    for (let i = clickRings.length - 1; i >= 0; i--) {
      clickRings[i].born += dt;
      clickRings[i].r    += 272 * dt;
      if (clickRings[i].r > W * 1.5) clickRings.splice(i, 1);
    }

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.roundRect(0, 0, W, H, 10); ctx.fill();

    ctx.globalCompositeOperation = 'screen';

    // Click rings
    clickRings.forEach(rg => {
      const a = Math.max(0, 0.44 * (1 - rg.born * 1.4));
      ctx.beginPath();
      ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${a.toFixed(3)})`;
      ctx.lineWidth = 1.3;
      ctx.stroke();
    });

    const ns = numSources(t);

    // Dots
    for (const d of dots) {
      const h = waveAt(d.x, d.y, t);

      // Map height to visual: only crests are bright, troughs are near-invisible
      // Normalize by source count so brightness stays consistent regardless of how many sources
      const norm = h / ns; // in [-1, 1] roughly
      const v    = Math.max(0, norm); // 0 to ~1

      if (v < 0.04) continue; // skip near-zero dots — big perf win

      const brightness = v;
      const radius     = 0.9 + brightness * 2.2;
      const alpha      = 0.12 + brightness * 0.78;

      if (brightness > 0.55) {
        ctx.shadowBlur  = brightness * 12;
        ctx.shadowColor = `rgba(255,255,255,${(brightness * 0.5).toFixed(3)})`;
      }

      ctx.beginPath();
      ctx.arc(d.x, d.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha).toFixed(3)})`;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Cursor dot
    if (isInside && mx > 0) {
      ctx.beginPath();
      ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
</script>
</body>
</html>
