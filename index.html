<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flow</title>
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: block;
    }
    #meta { display: flex; align-items: center; gap: 24px; }
    #label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="meta">
      <span id="label">flow — move + click</span>
    </div>
  </div>
<script>
  const SZ   = 422;
  const COLS = 30, ROWS = 30;
  const GAP  = SZ / COLS;
  const LEN  = 8;

  const canvas = document.getElementById('c');
  canvas.width = canvas.height = SZ;
  const ctx = canvas.getContext('2d');

  const phases = new Float32Array(COLS * ROWS);
  for (let i = 0; i < phases.length; i++) phases[i] = Math.random() * Math.PI * 2;

  let mx = SZ / 2, my = SZ / 2, isInside = false;
  const ripples = [];

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (SZ / r.width);
    my = (e.clientY - r.top)  * (SZ / r.height);
    isInside = true;
    maybeTick(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseenter', () => isInside = true);
  canvas.addEventListener('mouseleave', () => isInside = false);

  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    ripples.push({
      x: (e.clientX - r.left) * (SZ / r.width),
      y: (e.clientY - r.top)  * (SZ / r.height),
      born: performance.now() / 1000,
    });
    if (ripples.length > 3) ripples.shift();
    playClick();
  });

  function baseAngle(nx, ny, t) {
    const px = nx * 0.55 + t * 0.38;
    const py = ny * 0.42 - t * 0.26;
    return Math.atan2(
      Math.sin(px) + Math.sin(py + 1.1),
      Math.cos(py) + Math.cos(px - 0.9)
    );
  }

  function draw(t) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, SZ, SZ);

    const VORTEX_R = 100;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = (c + 0.5) * GAP;
        const y = (r + 0.5) * GAP;

        let angle = baseAngle(c, r, t);

        if (isInside) {
          const dx = x - mx, dy = y - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < VORTEX_R) {
            const t_blend = 1 - dist / VORTEX_R;
            const vortexAngle = Math.atan2(dx, -dy);
            const diff = vortexAngle - angle;
            const wrapped = Math.atan2(Math.sin(diff), Math.cos(diff));
            angle += wrapped * t_blend * 0.7;
          }
        }

        ripples.forEach(rip => {
          const age = t - rip.born;
          if (age > 2.5) return;
          const dx = x - rip.x, dy = y - rip.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const waveFront = age * 160;
          const ring = Math.abs(dist - waveFront);
          const amt = Math.exp(-ring * ring / (2 * 22 * 22)) * Math.exp(-age * 1.2) * 1.4;
          angle += amt * Math.atan2(dy, dx);
        });

        const phase = phases[r * COLS + c];
        const shimmer = 0.5 + 0.5 * Math.sin(phase + t * 2.8 - (c * 0.18 + r * 0.14));
        let alpha = 0.1 + shimmer * 0.25;

        if (isInside) {
          const dx = x - mx, dy = y - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          alpha += Math.max(0, 1 - dist / VORTEX_R) * 0.45;
        }

        const cos = Math.cos(angle), sin = Math.sin(angle);
        const x0 = x - cos * LEN / 2, y0 = y - sin * LEN / 2;
        const x1 = x + cos * LEN / 2, y1 = y + sin * LEN / 2;

        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.strokeStyle = `rgba(255,255,255,${(alpha * 0.5).toFixed(3)})`;
        ctx.lineWidth = 0.9;
        ctx.lineCap = 'round';
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x1, y1, 1.1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
        ctx.fill();
      }
    }

    if (isInside) {
      ctx.beginPath();
      ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    }
  }

  // ── Audio ─────────────────────────────────────────────────────
  let AC;
  function ac() {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  }

  let lastTick = { x: 0, y: 0 }, lastTickT = 0;
  function maybeTick(x, y) {
    const dx = x - lastTick.x, dy = y - lastTick.y;
    const speed = Math.sqrt(dx * dx + dy * dy);
    if (speed < 18) return;
    lastTick = { x, y };
    try {
      const a = ac(), t = a.currentTime;
      if (t - lastTickT < 0.038) return;
      lastTickT = t;
      // Soft field breath — lowpass noise, position tunes cutoff
      const nLen = Math.floor(a.sampleRate * 0.055);
      const nBuf = a.createBuffer(1, nLen, a.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
      const src = a.createBufferSource(); src.buffer = nBuf;
      const lpf = a.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.value = 340 + (mx / SZ) * 460;
      lpf.Q.value = 0.9;
      const g = a.createGain();
      g.gain.value = Math.min(0.014 + speed * 0.0007, 0.036);
      src.connect(lpf); lpf.connect(g); g.connect(a.destination);
      src.start(t);
    } catch (_) {}
  }

  function playClick() {
    try {
      const a = ac(), t = a.currentTime;

      // Vortex sweep — sine rising from 80→260Hz as field winds up
      const o = a.createOscillator(), g = a.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(80, t);
      o.frequency.exponentialRampToValueAtTime(260, t + 0.44);
      o.connect(g); g.connect(a.destination);
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.10, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.52);
      o.start(t); o.stop(t + 0.53);

      // Overtone at 3× tracks the sweep
      const o2 = a.createOscillator(), g2 = a.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(240, t);
      o2.frequency.exponentialRampToValueAtTime(780, t + 0.36);
      o2.connect(g2); g2.connect(a.destination);
      g2.gain.setValueAtTime(0.001, t);
      g2.gain.linearRampToValueAtTime(0.032, t + 0.03);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.40);
      o2.start(t); o2.stop(t + 0.41);

      // Air whoosh — noise through descending lowpass
      const nLen = Math.floor(a.sampleRate * 0.32);
      const nBuf = a.createBuffer(1, nLen, a.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i = 0; i < nLen; i++) nd[i] = (Math.random() * 2 - 1) * (1 - i / nLen);
      const nSrc = a.createBufferSource(); nSrc.buffer = nBuf;
      const lpf2 = a.createBiquadFilter(); lpf2.type = 'lowpass';
      lpf2.frequency.setValueAtTime(2000, t);
      lpf2.frequency.exponentialRampToValueAtTime(360, t + 0.3);
      const nG = a.createGain(); nG.gain.value = 0.12;
      nSrc.connect(lpf2); lpf2.connect(nG); nG.connect(a.destination);
      nSrc.start(t);
    } catch (_) {}
  }

  const t0 = performance.now();
  (function loop() {
    const t = (performance.now() - t0) / 1000;
    draw(t);
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
