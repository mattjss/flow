<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flow</title>
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: block;
    }
    #label {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="500" height="500"></canvas>
    <span id="label">flow — move + click</span>
  </div>
<script>
  const SZ  = 500;
  const GAP = SZ / 30;

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  let mx = SZ / 2, my = SZ / 2, isInside = false;
  const ripples = [];

  // ── Field ─────────────────────────────────────────────────────────────────
  function baseAngle(nx, ny, t) {
    const px = nx * 0.55 + t * 0.38;
    const py = ny * 0.42 - t * 0.26;
    return Math.atan2(
      Math.sin(px) + Math.sin(py + 1.1),
      Math.cos(py) + Math.cos(px - 0.9)
    );
  }

  const VORTEX_R = 110;
  function fieldAngle(x, y, t) {
    let angle = baseAngle(x / GAP - 0.5, y / GAP - 0.5, t);
    if (isInside) {
      const dx = x - mx, dy = y - my;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < VORTEX_R) {
        const blend = 1 - dist / VORTEX_R;
        const va = Math.atan2(dx, -dy);
        angle += Math.atan2(Math.sin(va - angle), Math.cos(va - angle)) * blend * 0.7;
      }
    }
    ripples.forEach(rip => {
      const age = t - rip.born;
      if (age > 2.5) return;
      const dx = x - rip.x, dy = y - rip.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ring = Math.abs(dist - age * 160);
      const amt = Math.exp(-ring * ring / (2 * 22 * 22)) * Math.exp(-age * 1.2) * 1.4;
      angle += amt * Math.atan2(dy, dx);
    });
    return angle;
  }

  // ── Background streamers ──────────────────────────────────────────────────
  const N_STREAMERS = 200;
  const TRAIL_LEN   = 42;
  const STREAM_SPD  = 60;

  function mkStreamer() {
    return { x: Math.random() * SZ, y: Math.random() * SZ, trail: [] };
  }
  const streamers = Array.from({ length: N_STREAMERS }, mkStreamer);

  function updateStreamers(t, dt) {
    for (const s of streamers) {
      s.trail.push({ x: s.x, y: s.y });
      if (s.trail.length > TRAIL_LEN) s.trail.shift();
      const a = fieldAngle(s.x, s.y, t);
      s.x += Math.cos(a) * STREAM_SPD * dt;
      s.y += Math.sin(a) * STREAM_SPD * dt;
      if (s.x < -12 || s.x > SZ + 12 || s.y < -12 || s.y > SZ + 12) {
        s.x = Math.random() * SZ;
        s.y = Math.random() * SZ;
        s.trail = [];
      }
    }
  }

  // ── Cursor flow particles ─────────────────────────────────────────────────
  const flowPts = [];
  const MAX_PTS = 80;
  function spawnPt(x, y) {
    if (flowPts.length >= MAX_PTS) return;
    flowPts.push({
      x: x + (Math.random()-0.5)*18,
      y: y + (Math.random()-0.5)*18,
      age: 0,
      life: 1.6 + Math.random() * 1.2
    });
  }

  function updateParticles(t, dt) {
    for (let i = flowPts.length - 1; i >= 0; i--) {
      const p = flowPts[i];
      p.age += dt;
      if (p.age >= p.life || p.x < 0 || p.x > SZ || p.y < 0 || p.y > SZ) {
        flowPts.splice(i, 1); continue;
      }
      const a = fieldAngle(p.x, p.y, t);
      p.x += Math.cos(a) * 42 * dt;
      p.y += Math.sin(a) * 42 * dt;
    }
  }

  // ── Events ────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (SZ / r.width);
    my = (e.clientY - r.top)  * (SZ / r.height);
    isInside = true;
    if (Math.random() < 0.4) spawnPt(mx, my);
  });
  canvas.addEventListener('mouseenter', () => { isInside = true; });
  canvas.addEventListener('mouseleave', () => { isInside = false; });

  canvas.addEventListener('pointerdown', e => {
    const r  = canvas.getBoundingClientRect();
    const px = (e.clientX - r.left) * (SZ / r.width);
    const py = (e.clientY - r.top)  * (SZ / r.height);
    ripples.push({ x: px, y: py, born: performance.now() / 1000 });
    if (ripples.length > 3) ripples.shift();
    for (let i = 0; i < 22; i++) spawnPt(px, py);
    playClick();
  });

  // ── Audio ─────────────────────────────────────────────────────────────────
  let clickAudio = null;
  function initAudio() {
    if (clickAudio) return;
    clickAudio = new Audio('./sounds/selection.mp3');
    clickAudio.volume = 0.42;
  }
  function playClick() {
    initAudio();
    clickAudio.currentTime = 0;
    clickAudio.play().catch(() => {});
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw(t) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.roundRect(0, 0, SZ, SZ, 10);
    ctx.fill();

    ctx.globalCompositeOperation = 'screen';

    // Streamers — single path per streamer, screen blend stacks brightness at convergence zones
    ctx.lineWidth = 0.9;
    ctx.lineCap   = 'round';
    for (const s of streamers) {
      if (s.trail.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(s.trail[0].x, s.trail[0].y);
      for (let i = 1; i < s.trail.length; i++) ctx.lineTo(s.trail[i].x, s.trail[i].y);
      ctx.strokeStyle = 'rgba(255,255,255,0.052)';
      ctx.stroke();
      // Head dot
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fill();
    }

    // Cursor flow particles (brighter — spawn cluster traces the field from click point)
    flowPts.forEach(p => {
      const life = 1 - p.age / p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${(life * life * 0.62).toFixed(3)})`;
      ctx.fill();
    });

    // Cursor dot
    if (isInside) {
      ctx.beginPath();
      ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    }
  }

  const t0 = performance.now();
  let lastT = 0;
  (function loop() {
    const t  = (performance.now() - t0) / 1000;
    const dt = Math.min(t - lastT, 0.05);
    lastT = t;
    updateStreamers(t, dt);
    updateParticles(t, dt);
    draw(t);
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
